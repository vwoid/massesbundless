      "What would you say to me if you knew I couldn't say no tonight? 😇😈",
      "I have a theory that you think about me more than you admit 😏 prove me wrong 💋",
      "I feel like you'd be really fun to spend a night with 😈 am I right or am I right?",
      "What's something you've always been curious about me? 🤭 Now's your chance to ask 💋",
      "You seem like the type who knows exactly what they want 😏 so tell me what do you want from me?",
      "I'm in a playful mood and no one is here to stop me 😈😈 lucky you 💋",
      "I've been told I'm hard to forget 😇 is that true for you? 💋",
      "If we were stuck somewhere together for a whole night, how do you think it would go? 😏",
      "What's the naughtiest thing you've ever done? 🤭 I'm asking because I'm about to top it 😈",
      "I feel like you and I would have a lot of fun together 😈 don't you think? 💋",
    ];

    let earnings = {}; let modelNotes = {}; let currentShiftIdx = 0;

    function showPage(pId, bId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(pId).classList.add('active');
      document.getElementById(bId).classList.add('active');
    }

    function init() {
      const list = document.getElementById('model-list');
      list.innerHTML = "";
      MODELS.forEach((name) => {
        const id = name.replace(/\s/g, '');
        earnings[name] = 0; modelNotes[name] = "";
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="model-header"><span class="model-name">${name}</span><span id="val-${id}" class="val-text">$0.00</span></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"><div><span class="label-tag">Statement</span><textarea class="input-box monospace" style="height:100px;" id="input-${id}" oninput="processInput('${name}')"></textarea></div><div><span class="label-tag">Notes</span><textarea class="input-box" style="height:100px; font-size:13px;" id="notes-${id}" oninput="updateNotes('${name}')"></textarea></div></div>`;
        list.appendChild(div);
      });
      // Auto-set today's date
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      document.getElementById('shift-date').value = `${yyyy}-${mm}-${dd}`;

      document.getElementById('bundle-count').innerText = `(${bundlePool.length} messages)`;
      document.getElementById('mass-count').innerText = `(${massPool.length} messages)`;
      showIceMessages(bundlePool, 'bundleList', 3);
      showIceMessages(massPool, 'massList', 3);
    }

    function cycleShift() {
      currentShiftIdx = (currentShiftIdx + 1) % SHIFTS.length;
      document.getElementById('shift-time').value = SHIFTS[currentShiftIdx];
    }

    function processInput(name) {
      const id = name.replace(/\s/g, '');
      const text = document.getElementById(`input-${id}`).value;
      const lines = text.split('\n');
      let total = 0;
      lines.forEach(line => {
        const money = line.match(/\$(\d+(\.\d{2})?)/g);
        if (money && money.length >= 2) total += parseFloat(money[money.length - 1].replace('$', ''));
      });
      earnings[name] = total;
      document.getElementById(`val-${id}`).innerText = `$${total.toFixed(2)}`;
      let g = 0; for (let k in earnings) g += earnings[k];
      document.getElementById('grand-total').innerText = `$${g.toFixed(2)}`;
    }

    function updateNotes(name) {
      const id = name.replace(/\s/g, '');
      modelNotes[name] = document.getElementById(`notes-${id}`).value;
    }

    function buildReport() {
      let r = ""; let grand = 0;
      MODELS.forEach((name, i) => {
        const val = earnings[name] || 0; const notes = modelNotes[name] || "";
        grand += val;
        r += `Model ${i+1}: ${name}\n`;
        if (notes.trim() !== "") { r += `${notes}\n`; }
        r += `---\n`;
      });
      // Format date nicely as DD/MM/YYYY
      const rawDate = document.getElementById('shift-date').value;
      let formattedDate = rawDate;
      if (rawDate) {
        const [y, m, d] = rawDate.split('-');
        formattedDate = `${d}/${m}/${y}`;
      }
      r += `Data: ${formattedDate}\n`;
      r += `Tura: ${document.getElementById('shift-time').value}\n`;
      r += `Total net: $${grand.toFixed(2)}\n`;
      r += `Custom / VC: ${document.getElementById('shift-custom').value}\nFani prioritari:\n${document.getElementById('shift-fani').value}`;
      document.getElementById('output-report').value = r;
    }

    function showIceMessages(pool, containerId, count) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      const picks = [...pool].sort(() => 0.5 - Math.random()).slice(0, count);
      picks.forEach(msg => {
        const div = document.createElement("div"); div.className = "msg-item";
        div.innerHTML = `<span class="msg-text">${msg}</span><button class="btn-finish" style="width:100%" onclick="navigator.clipboard.writeText(this.previousSibling.textContent.trim()); this.innerText='Copied!'">Copy Text</button>`;
        container.appendChild(div);
      });
    }

    window.onload = init;
  </script>
</body>
</html>
