  <style>

    body { font-family: 'Quicksand', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, #251010 0%, var(--bg) 60%); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 140px; }
    h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: 3px; margin: 40px 0; text-transform: uppercase; color: var(--accent-glow); text-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
    .nav-tabs { display: flex; background: var(--card-bg); padding: 6px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 30px; width: 100%; max-width: 650px; }
    .nav-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-dim); font-weight: 600; cursor: pointer; border-radius: 10px; transition: all 0.3s ease; }
    .nav-btn.active { background: var(--accent-red); color: white; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; width: 100%; max-width: 800px; box-sizing: border-box; }
    .model-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .model-name { font-size: 1.1rem; color: var(--accent-glow); font-weight: 600; }
    .val-text { color: var(--accent-glow); font-weight: 700; }
    .label-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: block; }
    .input-box { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text-main); font-family: inherit; resize: none; box-sizing: border-box; }
    .monospace { font-family: 'Consolas', monospace; font-size: 14px; }
    .msg-item { background: var(--input-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent-red); }
    .msg-text { font-size: 0.95rem; line-height: 1.6; color: #ddd; margin-bottom: 12px; display: block; }
    .bottom-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: rgba(30, 30, 35, 0.95); backdrop-filter: blur(12px); border: 1px solid #444; padding: 15px 25px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
    .total-val { font-size: 1.6rem; font-weight: 700; color: var(--accent-glow); }
    .btn-finish { background: #2a2a2e; color: var(--text-dim); border: 1px solid #444; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-finish:hover { border-color: var(--accent-glow); color: white; }
    .btn-cycle { background: #2a2a2e; border: 1px solid var(--border); color: var(--accent-glow); border-radius: 10px; padding: 0 15px; cursor: pointer; font-size: 1.2rem; }
    .page { width: 100%; max-width: 800px; display: none; }
    .page.active { display: block; }
    .btn-copy-full { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .pool-count { font-size: 0.7rem; color: var(--text-dim); margin-left: 8px; }
  </style>

    let earnings = {}; let modelNotes = {}; let currentShiftIdx = 0;

    function showPage(pId, bId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(pId).classList.add('active');
      document.getElementById(bId).classList.add('active');
    }

    function init() {
      const list = document.getElementById('model-list');
      list.innerHTML = "";
      MODELS.forEach((name) => {
        const id = name.replace(/\s/g, '');
        earnings[name] = 0; modelNotes[name] = "";
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="model-header"><span class="model-name">${name}</span><span id="val-${id}" class="val-text">$0.00</span></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"><div><span class="label-tag">Statement</span><textarea class="input-box monospace" style="height:100px;" id="input-${id}" oninput="processInput('${name}')"></textarea></div><div><span class="label-tag">Notes</span><textarea class="input-box" style="height:100px; font-size:13px;" id="notes-${id}" oninput="updateNotes('${name}')"></textarea></div></div>`;

      document.getElementById('bundle-count').innerText = `(${bundlePool.length} messages)`;

      showIceMessages(bundlePool, 'bundleList', 3);
      showIceMessages(massPool, 'massList', 3);

    function cycleShift() {
      currentShiftIdx = (currentShiftIdx + 1) % SHIFTS.length;
      document.getElementById('shift-time').value = SHIFTS[currentShiftIdx];
    }

    function processInput(name) {
      const id = name.replace(/\s/g, '');
      const text = document.getElementById(`input-${id}`).value;
      const lines = text.split('\n');
      let total = 0;
      lines.forEach(line => {
        const money = line.match(/\$(\d+(\.\d{2})?)/g);
        if (money && money.length >= 2) total += parseFloat(money[money.length - 1].replace('$', ''));
      });
      earnings[name] = total;
      document.getElementById(`val-${id}`).innerText = `$${total.toFixed(2)}`;
      let g = 0; for (let k in earnings) g += earnings[k];
      document.getElementById('grand-total').innerText = `$${g.toFixed(2)}`;
    }

    function updateNotes(name) {
      const id = name.replace(/\s/g, '');
      modelNotes[name] = document.getElementById(`notes-${id}`).value;
    }

    function buildReport() {
      let r = ""; let grand = 0;
      MODELS.forEach((name, i) => {
        const val = earnings[name] || 0; const notes = modelNotes[name] || "";
        grand += val;
        r += `Model ${i+1}: ${name}\n`;
        if (notes.trim() !== "") { r += `${notes}\n`; }
        r += `---\n`;
      });
      r += `Tura: ${document.getElementById('shift-time').value}\nTotal net: $${grand.toFixed(2)}\n`;
      r += `Custom / VC: ${document.getElementById('shift-custom').value}\nFani prioritari:\n${document.getElementById('shift-fani').value}`;
      document.getElementById('output-report').value = r;
    }

    function showIceMessages(pool, containerId, count) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      const picks = [...pool].sort(() => 0.5 - Math.random()).slice(0, count);
      picks.forEach(msg => {
        const div = document.createElement("div"); div.className = "msg-item";

        container.appendChild(div);
      });
    }

</html>
